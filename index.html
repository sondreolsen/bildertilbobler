<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bobler til bilder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const isRawViteSource = [...document.scripts].some((script) => script.src.endsWith("/src/main.tsx"));

      if (window.location.hostname.endsWith("github.io") && isRawViteSource) {
        import("./fallback.js");
      }
    </script>
  </body>
</html>
